  STOP: "2902"                     # 停止执行点动操作

JOG_JOINTPARAMETER:
  SET: "2604"                      # 设置关节轴点动参数
  INQUIRE: "2605"                  # 查询关节轴点动参数

JOG_RECTPARAMETER:
  SET: "2607"                      # 设置直角坐标点动参数
  INQUIRE: "2608"                  # 查询直角坐标点动参数

JOG_SENSITIVITY:
  SET: "260A"                      # 设置点动灵敏度
