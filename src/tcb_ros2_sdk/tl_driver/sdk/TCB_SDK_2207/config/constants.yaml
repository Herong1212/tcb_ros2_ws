CURRENTTORQ_INQUIRE: "2A06"        # 查询电机扭矩

AXISACTUALVEL_INQUIRE: "2A22"      # 查询轴速度

INTERPOLATION_MODE:
  SET: "2801"                      # 设置运动参数
