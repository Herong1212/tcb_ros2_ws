# This config file is used by ros2_control
controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    armleft_group_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    armright_group_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

armleft_group_controller:
  ros__parameters:
    joints:
      - left_tl_robot_joint1
      - left_tl_robot_joint2
      - left_tl_robot_joint3
      - left_tl_robot_joint4
      - left_tl_robot_joint5
      - left_tl_robot_joint6
      - left_tl_robot_joint7
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
armright_group_controller:
  ros__parameters:
    joints:
      - right_tl_robot_joint1
      - right_tl_robot_joint2
      - right_tl_robot_joint3
      - right_tl_robot_joint4
      - right_tl_robot_joint5
      - right_tl_robot_joint6
      - right_tl_robot_joint7
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity